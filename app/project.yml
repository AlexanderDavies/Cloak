name: Cloak
options:
  bundleIdPrefix: com.cloak
  deploymentTarget:
    iOS: "17.0"
packages:
  AppAuth:
    url: https://github.com/openid/AppAuth-iOS
    from: "1.7.6"
  # libsignal is intentionally NOT here: it is not consumable via SwiftPM (no root Package.swift;
  # CocoaPods / prebuilt XCFramework only — see swift/README "Use as a Swift Package … is not
  # supported"). Deferred to the crypto slice, which will add it via CocoaPods or the XCFramework.
targets:
  Cloak:
    type: application
    platform: iOS
    sources:
      - path: Cloak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cloak.app
        INFOPLIST_FILE: Cloak/Info.plist
        SWIFT_VERSION: "6.0"          # Swift 6 language mode → strict (complete) concurrency (guide §4)
        # Generate the standard Info.plist keys (CFBundleIdentifier/Executable/version) and MERGE the
        # custom CFBundleURLTypes (OIDC redirect scheme) from INFOPLIST_FILE above.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon   # home-screen icon (Cloak/Assets.xcassets)
    dependencies:
      - package: AppAuth
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          # Xcode's build-phase PATH excludes Homebrew, so add its bin dirs (Apple Silicon + Intel).
          export PATH="$PATH:/opt/homebrew/bin:/usr/local/bin"
          if which swiftlint >/dev/null; then
            swiftlint --strict
          else
            echo "error: SwiftLint not installed (run: brew install swiftlint)"; exit 1
          fi
  CloakTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CloakTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES   # test bundle Info.plist is auto-generated
        SWIFT_VERSION: "6.0"
    dependencies:
      - target: Cloak
schemes:
  Cloak:
    build:
      targets:
        Cloak: all
        CloakTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - CloakTests
