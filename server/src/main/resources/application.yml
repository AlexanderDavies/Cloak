cloak:
  auth:
    issuer-uri: http://localhost:8081/realms/cloak
    audience: cloak-api
  keycloak-admin:
    token-uri: http://localhost:8081/realms/cloak/protocol/openid-connect/token
    users-uri: http://localhost:8081/admin/realms/cloak/users
    client-id: cloak-server-admin
    # Dev-only secret — never a real credential. Matches iam/realm/cloak-realm.json.
    client-secret: cloak-server-admin-dev-secret
spring:
  application:
    name: server
  threads:
    virtual:
      enabled: true          # ARCHITECTURE_GUIDE §3.1
  kafka:
    # Record keys are plain strings (recipient sub); values are Avro via Confluent serdes
    # (queue/CLAUDE.md → Serialization). The registry URL is overridden per-environment.
    properties:
      schema.registry.url: http://localhost:8085
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    consumer:
      group-id: cloak-server
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: true
    # Producer/consumer spans so a message's Kafka hop joins the same distributed trace (§10).
    template:
      observation-enabled: true
    listener:
      ack-mode: record
      observation-enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/cloak
  datasource:
    url: jdbc:postgresql://localhost:5432/cloak
    username: cloak
    password: cloak
  flyway:
    enabled: true
    # Single source of truth for the schema (root db/ folder), per db/CLAUDE.md.
    locations: filesystem:../db/migrations
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate     # Flyway owns the schema; JPA only validates

# Observability (ARCHITECTURE_GUIDE §10): app-level metrics, traces, and logs exported over OTLP to
# the local grafana/otel-lgtm stack (the OTel Collector seam). Endpoints are overridable per
# environment via OTLP_HTTP_URL; in production they re-point at a standalone Collector with no code
# change. Logs OTLP export is added in Task 6.
logging:
  structured:
    format:
      console: ecs              # structured JSON to stdout (ECS); carries traceId/spanId
management:
  otlp:
    metrics:
      export:
        url: ${OTLP_HTTP_URL:http://localhost:4318}/v1/metrics
        step: 5s
  # Boot 4 namespaces OTLP tracing/logging export separately from metrics (management.otlp.metrics.*),
  # and the OTel resource attributes (service.name) flow onto every signal here.
  opentelemetry:
    resource-attributes:
      service.name: cloak-server
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_HTTP_URL:http://localhost:4318}/v1/traces
    logging:
      export:
        otlp:
          endpoint: ${OTLP_HTTP_URL:http://localhost:4318}/v1/logs
  tracing:
    sampling:
      probability: 1.0          # sample everything in dev/test; tune per environment later
  metrics:
    distribution:
      # Publish an explicit-bucket latency histogram for HTTP server requests so the dashboard's
      # p50/p95 panels resolve via histogram_quantile. Without this the timer exports only the +Inf
      # bucket and the quantile is NaN (empty graph).
      percentiles-histogram:
        http.server.requests: true

# Outbound-HTTP resilience for the Keycloak Admin API (ARCHITECTURE_GUIDE §7.4). The
# KeycloakAdminClient's calls carry @Retry + @CircuitBreaker for this "keycloak-admin" instance.
#
# Aspect order: CircuitBreaker is placed OUTSIDE Retry (lower order value = outer) — inverting
# Resilience4j's default of Retry-outer. This makes an open breaker fail fast before any retry, and
# makes a whole retry sequence record as ONE outcome in the breaker, so sliding-window-size /
# minimum-number-of-calls count logical lookups rather than individual HTTP attempts.
#
# retry-exceptions is a whitelist of transient failures: 5xx, connect/read timeouts
# (ResourceAccessException), and 429 (TooManyRequests). record-exceptions (what trips the breaker) is
# 5xx + timeouts only — a 429 is back-pressure (retry briefly), NOT unavailability, so it must not
# open the breaker; and every other 4xx is a definitive answer (our own misconfiguration), so it is
# neither retried nor recorded. NOTE: Retry-After is not honoured on 429 — accepted for now.
#
# Bounded latency (§7.4): there is no separate TimeLimiter (its thread-interrupt cancel does not
# reliably abort a blocking RestClient read and would fight virtual threads). The worst case is
# bounded by the primitives instead — per-attempt read timeout (3s, see KeycloakAdminConfig) ×
# max-attempts (3) per call — and sustained outages are cut short by the breaker.
resilience4j:
  retry:
    retry-aspect-order: 2               # inner (higher value): retries happen INSIDE the breaker
    instances:
      keycloak-admin:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpClientErrorException$TooManyRequests
  circuitbreaker:
    circuit-breaker-aspect-order: 1     # outer (lower value): an open breaker fails fast before any retry
    instances:
      keycloak-admin:
        failure-rate-threshold: 50
        sliding-window-type: count_based
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        # A Keycloak outage degrades one feature (user lookup) but the server itself is healthy — do
        # not let an open breaker flip /actuator/health and pull the instance from rotation.
        register-health-indicator: false
        record-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
