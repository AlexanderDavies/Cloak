plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.6'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'com.diffplug.spotless' version '7.0.4'
    id 'com.github.davidmc24.gradle.plugin.avro' version '1.9.1'
    id 'checkstyle'
    id 'jacoco'
}

group = 'com.cloak'
version = '0.0.1-SNAPSHOT'
description = 'server'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

spotless {
    java {
        target 'src/**/*.java'
        googleJavaFormat('1.34.0')
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
    }
}

checkstyle {
    toolVersion = '10.18.2'
    configFile = file('config/checkstyle/google_checks.xml')
    configProperties = [
        'org.checkstyle.google.suppressionfilter.config': file('config/checkstyle/checkstyle-suppressions.xml').path
    ]
    maxWarnings = 0          // warnings fail the build
    ignoreFailures = false   // violations fail the build
}

// Checkstyle scans each source set's Java, which includes the Avro plugin's generated
// sources (build/generated-*-avro-java). Generated code is not hand-authored API and is
// already excluded from the coverage denominator; drop the generated source tree from every
// Checkstyle task so the Avro envelope's machine-formatted output does not fail the
// Google-standards gate. Paths are resolved per source root, so filter on the absolute path.
tasks.withType(Checkstyle).configureEach {
    source = source.filter { !it.path.contains('generated-main-avro-java') }
}

repositories {
    mavenCentral()
    // Confluent artifacts (kafka-avro-serializer, schema registry client) are not on Maven Central.
    maven { url 'https://packages.confluent.io/maven/' }
}

sourceSets {
    integrationTest {
        java.srcDir 'src/integrationTest/java'
        resources.srcDir 'src/integrationTest/resources'
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }
}

// Single-source the Keycloak realm export from iam/: copy it onto the integrationTest
// classpath under realms/ at build time so the test container can import it via
// .withRealmImportFile("/realms/cloak-realm.json"). No hand-copied file in source control.
tasks.named('processIntegrationTestResources') {
    from('../iam/realm') { into 'realms' }
}

configurations {
    integrationTestImplementation.extendsFrom testImplementation
    integrationTestRuntimeOnly.extendsFrom testRuntimeOnly
}

dependencies {
    // Spring Boot 4.0.6 manages only Testcontainers *core* (2.0.5) and leaves the
    // module artifacts (junit-jupiter, postgresql, kafka) unversioned. Those modules
    // have no 2.x release yet — their latest is 1.21.4. Importing the Testcontainers
    // BOM pins core + all modules to a single, mutually compatible released version,
    // overriding Boot's core-only 2.0.5 pin and keeping the harness coherent.
    integrationTestImplementation platform('org.testcontainers:testcontainers-bom:1.21.4')
    // Boot's dependency management would otherwise drag core to 2.0.5 (its managed
    // pin), splitting it from the 1.21.4 modules; force core onto 1.21.4 to match.
    // Revisit on the next Spring Boot bump: once Boot ships a 2.x-compatible module
    // set, drop this strictly pin and let the BOM alone own the version.
    integrationTestImplementation('org.testcontainers:testcontainers') {
        version { strictly '1.21.4' }
    }

    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-websocket'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    // Observability (ARCHITECTURE_GUIDE §10): export metrics, traces, and logs over OTLP to the
    // local grafana/otel-lgtm stack (the OTel Collector seam). Micrometer + OTel versions are
    // managed by the Spring Boot BOM; only the unmanaged third-party artifacts are pinned.
    implementation 'io.micrometer:micrometer-registry-otlp'                          // metrics → OTLP
    implementation 'io.micrometer:micrometer-tracing-bridge-otel'                    // traces → OTel
    implementation 'io.opentelemetry:opentelemetry-exporter-otlp'                    // OTLP span export
    // Boot 4 split the OpenTelemetry autoconfig across modules that NO starter pulls:
    //  - spring-boot-opentelemetry: the OTel SDK beans + OTLP *logging* export.
    //  - spring-boot-micrometer-tracing-opentelemetry: the OTel Tracer + OTLP *span* export
    //    (OpenTelemetryTracingAutoConfiguration + OtlpTracingAutoConfiguration).
    // Without both, the OTLP export autoconfigs silently @ConditionalOnClass-skip and nothing ships.
    implementation 'org.springframework.boot:spring-boot-opentelemetry'
    implementation 'org.springframework.boot:spring-boot-micrometer-tracing-opentelemetry'
    // Bridges Logback events into the OTel SDK LoggerProvider so structured logs ship over OTLP to
    // Loki, tagged with the active trace id. Boot wires the LoggerProvider + OTLP log exporter but
    // installs no appender; this OTel instrumentation artifact is alpha-versioned (its only stable
    // line) and not BOM-managed, so it is pinned explicitly. The version MUST match the
    // opentelemetry-api the Boot BOM manages (1.55.0) — a newer appender calls
    // LogRecordBuilder.setException(Throwable) (added in api 1.56.0) and throws NoSuchMethodError on
    // every exception-bearing log. 2.21.0-alpha targets api 1.55.0.
    implementation 'io.opentelemetry.instrumentation:opentelemetry-logback-appender-1.0:2.21.0-alpha'
    implementation 'net.ttddyy.observation:datasource-micrometer-spring-boot:2.2.1' // JDBC spans (Boot 4)
    // @Observed → metric+span needs Micrometer's ObservedAspect, which requires AspectJ proxying.
    // Spring Boot 4 discontinued spring-boot-starter-aop (GA ends at 3.5.x); aspectjweaver alone
    // (BOM-managed) puts AspectJ on the classpath and triggers Boot's AopAutoConfiguration. spring-aop
    // itself arrives transitively via spring-context.
    implementation 'org.aspectj:aspectjweaver'
    implementation 'org.springframework.kafka:spring-kafka'
    implementation 'org.springframework.boot:spring-boot-kafka'
    implementation 'org.apache.avro:avro:1.11.4'
    implementation 'io.confluent:kafka-avro-serializer:7.6.0'
    // Spring Boot 4 split Flyway auto-configuration out of spring-boot-autoconfigure
    // into the dedicated spring-boot-flyway module; without it FlywayAutoConfiguration
    // is absent and migrations never run (the context starts with an empty schema).
    implementation 'org.springframework.boot:spring-boot-flyway'
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.flywaydb:flyway-database-postgresql'
    runtimeOnly 'org.postgresql:postgresql'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'com.tngtech.archunit:archunit-junit5:1.3.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    integrationTestImplementation 'org.springframework.boot:spring-boot-testcontainers'
    integrationTestImplementation 'org.testcontainers:junit-jupiter'
    integrationTestImplementation 'org.testcontainers:postgresql'
    integrationTestImplementation 'org.testcontainers:kafka'
    integrationTestImplementation 'org.springframework.kafka:spring-kafka-test'
    integrationTestImplementation 'com.github.dasniko:testcontainers-keycloak:3.4.0'
    integrationTestImplementation 'org.testcontainers:grafana' // LgtmStackContainer (otel-lgtm)
    integrationTestImplementation 'org.awaitility:awaitility'
}

tasks.named('test') {
    useJUnitPlatform()
}

jacoco {
    // 0.8.13 is the first JaCoCo release that reads Java 25 bytecode (class file major
    // version 69). 0.8.12 errors with "Unsupported class file major version 69" once real
    // Java-25 app classes exist, breaking jacocoTestReport / jacocoTestCoverageVerification.
    toolVersion = '0.8.13'
}

// Coverage is measured on meaningful code only (generated/config/bootstrap excluded),
// per root CLAUDE.md > Engineering workflow & quality gates.
def coverageExclusions = [
    'com/cloak/server/ServerApplication.class',
    'com/cloak/server/**/config/**',
    // Avro-generated envelope (and its nested Builder/types) — generated code is excluded from
    // the coverage denominator per root CLAUDE.md. Lives outside **/config/**, so list it here.
    'com/cloak/server/adapter/output/kafka/message/OutboundEnvelope*.class'
]

tasks.named('jacocoTestReport') {
    // Aggregate unit + integration execution data.
    executionData fileTree(layout.buildDirectory).include('jacoco/*.exec')
    dependsOn tasks.matching { it.name == 'test' || it.name == 'integrationTest' }
    reports {
        xml.required = true
        html.required = true
    }
    classDirectories.setFrom(classDirectories.files.collect {
        fileTree(it) { exclude coverageExclusions }
    })
}

tasks.named('jacocoTestCoverageVerification') {
    executionData fileTree(layout.buildDirectory).include('jacoco/*.exec')
    dependsOn tasks.matching { it.name == 'test' || it.name == 'integrationTest' }
    classDirectories.setFrom(classDirectories.files.collect {
        fileTree(it) { exclude coverageExclusions }
    })
    violationRules {
        rule {
            limit {
                counter = 'INSTRUCTION'
                minimum = 0.90
            }
        }
    }
}

tasks.register('integrationTest', Test) {
    description = 'Runs @SpringBootTest integration tests on Testcontainers.'
    group = 'verification'
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath
    useJUnitPlatform()
    shouldRunAfter tasks.named('test')
    jvmArgs '-Djdk.tracePinnedThreads=full'   // ARCHITECTURE_GUIDE §12.7
}

tasks.named('check') {
    dependsOn tasks.named('integrationTest')
    dependsOn tasks.named('jacocoTestCoverageVerification')
    // Always emit the HTML/XML coverage report alongside the gate so CI has an artefact.
    dependsOn tasks.named('jacocoTestReport')
}
