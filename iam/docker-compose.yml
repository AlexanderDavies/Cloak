name: cloak-iam

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: cloak-keycloak
    # Dev mode: embedded storage + HTTP, self-contained and disposable.
    # --import-realm loads /opt/keycloak/data/import on startup.
    command: ["start-dev", "--import-realm"]
    environment:
      # Local-dev admin credential only — never reused outside local dev.
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8081"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
    ports:
      - "8081:8081"
    volumes:
      - ./realm:/opt/keycloak/data/import:ro
      - ./themes/cloak:/opt/keycloak/themes/cloak:ro
